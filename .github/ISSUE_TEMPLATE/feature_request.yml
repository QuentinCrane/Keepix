name: Feature request
description: Suggest an improvement for 看了么.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: 想解决的问题
      description: 这个需求会改善哪一段整理体验？
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: 期望方案
      description: 描述你希望看到的交互、页面或规则。
    validations:
      required: true
  - type: checkboxes
    id: boundaries
    attributes:
      label: 产品边界确认
      options:
        - label: 不需要账号、会员、支付、订阅或远程授权。
        - label: 不上传用户照片或视频。
        - label: 不直接永久删除媒体，保留确认或恢复空间。
