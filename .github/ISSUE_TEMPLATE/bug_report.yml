name: Bug report
description: Report a reproducible problem in 看了么.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        感谢反馈。请不要上传包含个人照片、视频、精确位置或签名密钥的文件。
  - type: textarea
    id: summary
    attributes:
      label: 问题描述
      description: 简要说明发生了什么。
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: 复现步骤
      description: 写出可复现步骤。
      placeholder: |
        1. 打开...
        2. 点击...
        3. 看到...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: 预期结果
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: 实际结果
    validations:
      required: true
  - type: input
    id: device
    attributes:
      label: 设备与系统
      placeholder: Pixel 8 / Android 15
  - type: input
    id: version
    attributes:
      label: App 版本或提交
      placeholder: 2.2.2 或 commit hash
  - type: textarea
    id: logs
    attributes:
      label: 日志或截图
      description: 可选。请先移除个人媒体内容、路径、账号信息和密钥。
